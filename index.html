<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Planning équipe — ARTE</title>
  <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #ffffff; --bg2: #f5f5f3; --bg3: #eceae5;
      --text: #1a1a18; --text2: #6b6b67; --text3: #9e9e99;
      --border: rgba(0,0,0,0.08); --border2: rgba(0,0,0,0.15);
      --accent: #D85A30;
      --radius-sm: 5px; --radius-md: 10px; --radius-lg: 14px;
      --shadow: 0 2px 16px rgba(0,0,0,0.08);
      --hour-h: 64px;
      --sidebar: 52px;
      --topbar-h: 56px;
      --legend-h: 36px;
      --header-h: 58px;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #1c1c1a; --bg2: #252523; --bg3: #2f2f2c;
        --text: #f0efe9; --text2: #9e9e97; --text3: #6b6b67;
        --border: rgba(255,255,255,0.07); --border2: rgba(255,255,255,0.14);
      }
    }
    html, body { height: 100%; overflow: hidden; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; background: var(--bg2); color: var(--text); font-size: 14px; }

    /* ── APP SHELL ── */
    #app { height: 100vh; display: flex; flex-direction: column; }

    /* ── TOPBAR ── */
    .topbar {
      flex-shrink: 0; height: var(--topbar-h);
      display: flex; align-items: center; gap: 10px; padding: 0 16px;
      background: var(--bg); border-bottom: 0.5px solid var(--border2); z-index: 100;
    }
    .brand { display: flex; align-items: center; gap: 9px; margin-right: 4px; }
    .brand-pill { background: var(--accent); color: #fff; font-size: 12px; font-weight: 700; letter-spacing: .06em; padding: 3px 8px; border-radius: 5px; }
    .brand-name { font-size: 14px; font-weight: 500; color: var(--text); }
    .week-nav { display: flex; align-items: center; gap: 6px; margin-right: auto; flex-wrap: wrap; }
    .week-label { font-size: 13px; font-weight: 500; color: var(--text); min-width: 220px; text-align: center; }
    .profile-chip { display: flex; align-items: center; gap: 7px; padding: 5px 11px; background: var(--bg2); border: 0.5px solid var(--border2); border-radius: 20px; cursor: pointer; transition: background .12s; font-size: 13px; color: var(--text); }
    .profile-chip:hover { background: var(--bg3); }
    .chip-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
    .chip-caret { font-size: 9px; color: var(--text3); margin-left: 2px; }

    /* ── LEGEND ── */
    .legend-bar {
      flex-shrink: 0; height: var(--legend-h);
      display: flex; align-items: center; gap: 0;
      padding: 0 12px 0 calc(var(--sidebar) + 12px);
      background: var(--bg); border-bottom: 0.5px solid var(--border);
      overflow-x: auto; scrollbar-width: none;
    }
    .legend-bar::-webkit-scrollbar { display: none; }
    .legend-item { display: flex; align-items: center; gap: 5px; font-size: 12px; color: var(--text2); padding: 0 12px; border-right: 0.5px solid var(--border); white-space: nowrap; height: 100%; }
    .legend-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }

    /* ── CALENDAR AREA ── */
    .cal-area { flex: 1; overflow: hidden; display: flex; flex-direction: column; }

    /* Day headers */
    .days-header {
      flex-shrink: 0; display: grid;
      grid-template-columns: var(--sidebar) repeat(7, 1fr);
      background: var(--bg); border-bottom: 0.5px solid var(--border2);
    }
    .dh-spacer { border-right: 0.5px solid var(--border2); }
    .dh-cell { padding: 8px 6px; text-align: center; border-right: 0.5px solid var(--border); }
    .dh-cell:last-child { border-right: none; }
    .dh-name { font-size: 11px; color: var(--text3); text-transform: uppercase; letter-spacing: .06em; font-weight: 500; }
    .dh-num { font-size: 22px; font-weight: 400; color: var(--text); line-height: 1.2; margin-top: 3px; display: inline-block; width: 36px; height: 36px; line-height: 36px; border-radius: 50%; }
    .dh-num.today { background: var(--accent); color: #fff; font-size: 18px; font-weight: 500; }

    /* Scrollable body */
    .grid-scroll { flex: 1; overflow-y: auto; overflow-x: hidden; }
    .grid-scroll::-webkit-scrollbar { width: 5px; }
    .grid-scroll::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }
    .grid-body { display: grid; grid-template-columns: var(--sidebar) repeat(7, 1fr); }

    /* Time sidebar */
    .time-sidebar { position: sticky; left: 0; z-index: 10; background: var(--bg); border-right: 0.5px solid var(--border2); }
    .time-label { height: var(--hour-h); display: flex; align-items: flex-start; justify-content: flex-end; padding: 4px 8px 0 0; font-size: 10px; color: var(--text3); font-weight: 500; letter-spacing: .03em; }

    /* Day columns */
    .day-col { position: relative; border-right: 0.5px solid var(--border); cursor: crosshair; background: var(--bg); user-select: none; }
    .day-col:last-child { border-right: none; }
    .day-col.today-col { background: color-mix(in srgb, var(--accent) 4%, var(--bg)); }
    .hour-line { position: absolute; left: 0; right: 0; height: 0.5px; background: var(--border); pointer-events: none; }
    .half-line { position: absolute; left: 4px; right: 0; height: 0.5px; background: var(--border); opacity: .5; pointer-events: none; }

    /* Now line */
    .now-bar { position: absolute; left: 0; right: 0; height: 2px; background: var(--accent); z-index: 5; pointer-events: none; }
    .now-bar::before { content: ''; position: absolute; left: -4px; top: -4px; width: 10px; height: 10px; border-radius: 50%; background: var(--accent); }

    /* ── EVENT BLOCKS ── */
    .ev-block {
      position: absolute; border-radius: var(--radius-sm);
      padding: 4px 7px; font-size: 11px; line-height: 1.4;
      overflow: hidden; cursor: pointer; z-index: 10;
      border-left: 3px solid transparent;
      transition: filter .1s, box-shadow .1s;
    }
    .ev-block:hover { filter: brightness(.92); box-shadow: 0 2px 8px rgba(0,0,0,.15); z-index: 20; }
    .ev-time { font-size: 10px; opacity: .75; font-weight: 500; white-space: nowrap; overflow: hidden; }
    .ev-title { font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .ev-person { font-size: 10px; opacity: .7; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    /* ── MODALS ── */
    .overlay { position: fixed; inset: 0; background: rgba(0,0,0,.4); z-index: 300; display: none; align-items: center; justify-content: center; padding: 1rem; }
    .overlay.open { display: flex; }
    .modal { background: var(--bg); border: 0.5px solid var(--border2); border-radius: var(--radius-lg); padding: 1.5rem 1.75rem; width: 100%; max-width: 460px; box-shadow: 0 12px 48px rgba(0,0,0,.22); position: relative; max-height: 90vh; overflow-y: auto; }
    .modal-title { font-size: 15px; font-weight: 500; color: var(--text); margin-bottom: 1.25rem; padding-right: 2rem; }
    .modal-close { position: absolute; top: 14px; right: 14px; background: none; border: none; font-size: 20px; color: var(--text3); cursor: pointer; padding: 0; line-height: 1; }
    .modal-close:hover { color: var(--text); }
    .modal-who { display: flex; align-items: center; gap: 7px; font-size: 12px; color: var(--text2); padding: 7px 12px; background: var(--bg2); border-radius: var(--radius-sm); margin-bottom: 1rem; }
    .modal-who strong { color: var(--text); font-weight: 500; }
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px; }
    .form-grid.full { grid-template-columns: 1fr; }
    .ff { display: flex; flex-direction: column; gap: 4px; }
    .ff label { font-size: 12px; color: var(--text2); font-weight: 500; }
    .modal-footer { display: flex; align-items: center; justify-content: space-between; margin-top: 1.25rem; gap: 8px; }
    .modal-footer .right { display: flex; gap: 8px; }

    /* ── BUTTONS ── */
    button { font-family: inherit; font-size: 13px; padding: 8px 16px; border-radius: var(--radius-sm); cursor: pointer; border: 0.5px solid var(--border2); background: var(--bg); color: var(--text); transition: background .12s; white-space: nowrap; }
    button:hover { background: var(--bg2); }
    button:active { transform: scale(.98); }
    button.btn-primary { background: var(--accent); color: #fff; border-color: transparent; font-weight: 500; }
    button.btn-primary:hover { background: #c0511f; }
    button.btn-danger { background: none; border-color: #E24B4A; color: #E24B4A; }
    button.btn-danger:hover { background: #FCEBEB; }
    button.btn-icon { padding: 6px 12px; font-size: 16px; line-height: 1; }

    /* ── INPUTS ── */
    input, select, textarea { width: 100%; padding: 8px 10px; font-size: 13px; font-family: inherit; background: var(--bg2); border: 0.5px solid var(--border2); border-radius: var(--radius-sm); color: var(--text); outline: none; transition: border-color .12s; }
    input:focus, select:focus, textarea:focus { border-color: var(--accent); }
    input::placeholder, textarea::placeholder { color: var(--text3); }
    input[readonly], textarea[readonly] { opacity: .7; cursor: default; }
    textarea { resize: vertical; min-height: 68px; line-height: 1.5; }

    /* ── WELCOME SCREEN ── */
    .welcome-screen { display: flex; align-items: center; justify-content: center; min-height: 100vh; background: var(--bg2); padding: 2rem; }
    .welcome-card { background: var(--bg); border: 0.5px solid var(--border2); border-radius: var(--radius-lg); padding: 2rem 2.25rem; width: 100%; max-width: 430px; box-shadow: var(--shadow); }
    .wc-header { display: flex; align-items: center; gap: 10px; margin-bottom: 1.5rem; }
    .wc-logo { background: var(--accent); color: #fff; font-size: 13px; font-weight: 700; letter-spacing: .07em; padding: 5px 10px; border-radius: 6px; }
    .wc-title { font-size: 17px; font-weight: 500; }
    .wc-sub { font-size: 13px; color: var(--text2); line-height: 1.65; margin-bottom: 1.5rem; }
    .wc-label { font-size: 12px; color: var(--text2); font-weight: 500; display: block; margin-bottom: 5px; margin-top: 16px; }
    .sep { height: 0.5px; background: var(--border); margin: 1.5rem 0; }

    /* Color picker */
    .color-grid { display: flex; gap: 9px; flex-wrap: wrap; margin-top: 6px; }
    .cswatch { width: 34px; height: 34px; border-radius: 50%; cursor: pointer; border: 3px solid transparent; display: flex; align-items: center; justify-content: center; transition: border-color .12s, opacity .12s, transform .1s; flex-shrink: 0; }
    .cswatch.active { border-color: var(--text); transform: scale(1.12); }
    .cswatch.taken { opacity: .38; cursor: not-allowed; }
    .cswatch .sw-init { font-size: 11px; font-weight: 700; color: rgba(255,255,255,.92); pointer-events: none; text-shadow: 0 1px 3px rgba(0,0,0,.3); }
    .taken-hint { font-size: 11px; color: var(--text3); margin-top: 8px; line-height: 1.7; }

    /* ── SETUP SCREEN ── */
    .setup-screen { display: flex; align-items: flex-start; justify-content: center; min-height: 100vh; background: var(--bg2); padding: 2.5rem 1rem; overflow-y: auto; }
    .setup-card { background: var(--bg); border: 0.5px solid var(--border2); border-radius: var(--radius-lg); padding: 2rem 2.25rem; width: 100%; max-width: 560px; box-shadow: var(--shadow); }
    .setup-tag { display: inline-block; background: #FAEEDA; color: #854F0B; font-size: 11px; font-weight: 600; padding: 3px 9px; border-radius: 4px; margin-bottom: 12px; }
    .setup-title { font-size: 18px; font-weight: 500; margin-bottom: 8px; color: var(--text); }
    .setup-sub { font-size: 13px; color: var(--text2); line-height: 1.65; margin-bottom: 1.5rem; }
    .step { display: flex; gap: 13px; margin-bottom: 14px; }
    .step-num { width: 24px; height: 24px; border-radius: 50%; background: var(--accent); color: #fff; font-size: 12px; font-weight: 700; display: flex; align-items: center; justify-content: center; flex-shrink: 0; margin-top: 1px; }
    .step-text { font-size: 13px; color: var(--text2); line-height: 1.65; }
    .step-text strong { color: var(--text); font-weight: 500; }
    .step-text a { color: var(--accent); text-decoration: none; }
    .step-text a:hover { text-decoration: underline; }
    pre.code { background: var(--bg2); border: 0.5px solid var(--border2); border-radius: var(--radius-sm); padding: 10px 14px; font-family: 'SF Mono','Fira Code','Consolas',monospace; font-size: 12px; color: var(--text2); overflow-x: auto; margin-top: 8px; line-height: 1.65; white-space: pre-wrap; }
    .err-msg { font-size: 12px; color: #E24B4A; margin-top: 10px; }
  </style>
</head>
<body>
<div id="app"><div style="display:flex;align-items:center;justify-content:center;height:100vh;font-size:13px;color:#999;">Chargement…</div></div>
<div class="overlay" id="overlay">
  <div class="modal" id="modal"></div>
</div>

<script>
/* ═══════════════════════════════════════
   PALETTE (14 couleurs)
═══════════════════════════════════════ */
const COL = {
  coral:   { dot:'#D85A30', bg:'#FAECE7', label:'Corail'   },
  red:     { dot:'#E24B4A', bg:'#FCEBEB', label:'Rouge'    },
  orange:  { dot:'#DC6B1F', bg:'#FEF0E4', label:'Orange'   },
  amber:   { dot:'#BA7517', bg:'#FAEEDA', label:'Ambre'    },
  yellow:  { dot:'#A08B0A', bg:'#FBF8DC', label:'Jaune'    },
  lime:    { dot:'#5A9E1D', bg:'#EFF5E1', label:'Citron'   },
  teal:    { dot:'#1D9E75', bg:'#E1F5EE', label:'Vert'     },
  cyan:    { dot:'#1E8BB5', bg:'#E2F3FA', label:'Cyan'     },
  blue:    { dot:'#378ADD', bg:'#E6F1FB', label:'Bleu'     },
  indigo:  { dot:'#4B6DD5', bg:'#EBF0FB', label:'Indigo'   },
  purple:  { dot:'#7F77DD', bg:'#EEEDFE', label:'Violet'   },
  pink:    { dot:'#D4537E', bg:'#FBEAF0', label:'Rose'     },
  brown:   { dot:'#8B5E3C', bg:'#F5EDE6', label:'Brun'     },
  slate:   { dot:'#5F6978', bg:'#EEF0F3', label:'Ardoise'  },
};

/* ═══════════════════════════════════════
   CONSTANTES CALENDRIER
═══════════════════════════════════════ */
const HOUR_H     = 64;   // px per hour
const T_START    = 7;    // 07:00
const T_END      = 21;   // 21:00
const HOURS      = Array.from({length: T_END - T_START}, (_, i) => T_START + i);
const DAY_NAMES  = ['Lun','Mar','Mer','Jeu','Ven','Sam','Dim'];
const MONTHS_S   = ['janv.','févr.','mars','avr.','mai','juin','juil.','août','sept.','oct.','nov.','déc.'];
const MONTHS_L   = ['janvier','février','mars','avril','mai','juin','juillet','août','septembre','octobre','novembre','décembre'];

/* ═══════════════════════════════════════
   STATE
═══════════════════════════════════════ */
let screen    = 'loading';
let me        = { name:'', color:'coral' };
let teamMap   = {};   // { colorKey: personName }
let eventsMap = {};   // { id: eventObj }
let weekOff   = 0;
let db        = null;

const LS_CONFIG = 'arte_fb_cfg_v1';
const LS_ME     = 'arte_me_v2';

/* ═══════════════════════════════════════
   HELPERS
═══════════════════════════════════════ */
function lsGet(k)    { try{ return JSON.parse(localStorage.getItem(k)); }catch(e){ return null; } }
function lsSet(k,v)  { try{ localStorage.setItem(k, JSON.stringify(v)); }catch(e){} }
function lsRm(k)     { try{ localStorage.removeItem(k); }catch(e){} }

function esc(s) {
  return String(s??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function uid() { return Date.now().toString(36)+Math.random().toString(36).slice(2,7); }

function toMin(t)   { const[h,m]=(t||'00:00').split(':').map(Number); return h*60+m; }
function toTime(m)  { return `${String(Math.floor(m/60)).padStart(2,'0')}:${String(m%60).padStart(2,'0')}`; }
function toPx(t)    { return (toMin(t)/60 - T_START) * HOUR_H; }
function pxToTime(px) {
  const raw = T_START*60 + (px/HOUR_H)*60;
  const snapped = Math.round(raw/30)*30;
  return toTime(Math.max(T_START*60, Math.min(T_END*60-30, snapped)));
}

function getMonday(d) {
  const dt = new Date(d); const day = dt.getDay()||7;
  dt.setDate(dt.getDate()-day+1); dt.setHours(0,0,0,0); return dt;
}
function dk(d) { return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; }
function todayDk() { const n=new Date(); n.setHours(0,0,0,0); return dk(n); }

/* ═══════════════════════════════════════
   FIREBASE
═══════════════════════════════════════ */
function initFb(config) {
  try {
    if (!firebase.apps.length) firebase.initializeApp(config);
    db = firebase.database();
    return true;
  } catch(e) { console.error(e); return false; }
}

function startListeners() {
  if (!db) return;
  db.ref('events').on('value', snap => {
    eventsMap = snap.val() || {};
    if (screen === 'calendar') renderCalendar();
  });
  db.ref('team').on('value', snap => {
    teamMap = snap.val() || {};
    if (screen === 'calendar') renderCalendar();
    else if (screen === 'welcome') buildColorPicker();
  });
}

/* ═══════════════════════════════════════
   INIT
═══════════════════════════════════════ */
function init() {
  const cfg = lsGet(LS_CONFIG);
  if (cfg && cfg.databaseURL) {
    const ok = initFb(cfg);
    if (ok) {
      const savedMe = lsGet(LS_ME);
      if (savedMe && savedMe.name) {
        me = savedMe; screen = 'calendar';
        startListeners();
      } else {
        screen = 'welcome';
        db.ref('team').once('value', snap => {
          teamMap = snap.val() || {};
          startListeners();
          renderWelcome();
        });
      }
    } else { screen = 'setup'; renderSetup(); }
  } else { screen = 'setup'; renderSetup(); }
}

/* ═══════════════════════════════════════
   SETUP SCREEN
═══════════════════════════════════════ */
function renderSetup() {
  document.getElementById('app').innerHTML = `
    <div class="setup-screen">
      <div class="setup-card">
        <div class="setup-tag">Configuration initiale — à faire une seule fois</div>
        <div class="setup-title">Connexion à Firebase</div>
        <div class="setup-sub">
          Pour synchroniser le planning en temps réel entre tous les appareils, ce planning utilise Firebase (Google), totalement gratuit pour votre usage. Suivez ces 3 étapes :
        </div>

        <div class="step">
          <div class="step-num">1</div>
          <div class="step-text">
            Créez un compte gratuit sur
            <a href="https://console.firebase.google.com" target="_blank">console.firebase.google.com</a>
            puis cliquez <strong>Créer un projet</strong> (désactivez Google Analytics, non nécessaire).
          </div>
        </div>

        <div class="step">
          <div class="step-num">2</div>
          <div class="step-text">
            Dans votre projet, allez dans <strong>Realtime Database</strong> (menu gauche) →
            <strong>Créer une base de données</strong> → choisissez la région la plus proche
            (europe-west1 pour la France) → <strong>Démarrer en mode test</strong>.
          </div>
        </div>

        <div class="step">
          <div class="step-num">3</div>
          <div class="step-text">
            Allez dans <strong>Paramètres du projet ⚙️</strong> → onglet <strong>Général</strong> → section
            <strong>Vos applications</strong> → cliquez l'icône Web <code style="background:var(--bg2);padding:1px 5px;border-radius:3px;">&lt;/&gt;</code> →
            nommez votre app → copiez l'objet <code style="background:var(--bg2);padding:1px 5px;border-radius:3px;">firebaseConfig</code>
            et collez-le ci-dessous :
          </div>
        </div>

        <div style="margin-top:.5rem;">
          <label class="wc-label">Votre configuration Firebase</label>
          <textarea id="fbRaw" rows="11" placeholder='{
  "apiKey": "AIzaSy...",
  "authDomain": "mon-projet.firebaseapp.com",
  "databaseURL": "https://mon-projet-default-rtdb.europe-west1.firebasedatabase.app",
  "projectId": "mon-projet",
  "storageBucket": "mon-projet.appspot.com",
  "messagingSenderId": "123456789",
  "appId": "1:123456789:web:abc..."
}'></textarea>
        </div>

        <div style="display:flex;justify-content:flex-end;margin-top:1rem;gap:10px;align-items:center;">
          <span id="setupErr" class="err-msg" style="display:none;"></span>
          <button class="btn-primary" onclick="submitSetup()">Connecter et continuer →</button>
        </div>
      </div>
    </div>`;
}

function submitSetup() {
  const raw  = (document.getElementById('fbRaw').value || '').trim();
  const errEl = document.getElementById('setupErr');
  errEl.style.display = 'none';
  let cfg;
  try {
    const jsonStr = raw.replace(/^[^{]*/, '').replace(/[^}]*$/, '');
    cfg = JSON.parse(jsonStr);
  } catch(e) {
    errEl.textContent = 'JSON invalide. Copiez l\'objet de configuration tel quel depuis Firebase.';
    errEl.style.display = 'inline';
    return;
  }
  if (!cfg.databaseURL) {
    errEl.textContent = '"databaseURL" manquant. Vérifiez que Realtime Database est activé dans votre projet.';
    errEl.style.display = 'inline';
    return;
  }
  const ok = initFb(cfg);
  if (!ok) {
    errEl.textContent = 'Connexion Firebase échouée. Vérifiez la configuration.';
    errEl.style.display = 'inline';
    return;
  }
  lsSet(LS_CONFIG, cfg);
  screen = 'welcome';
  db.ref('team').once('value', snap => {
    teamMap = snap.val() || {};
    startListeners();
    renderWelcome();
  });
}

/* ═══════════════════════════════════════
   WELCOME SCREEN
═══════════════════════════════════════ */
function renderWelcome() {
  document.getElementById('app').innerHTML = `
    <div class="welcome-screen">
      <div class="welcome-card">
        <div class="wc-header">
          <span class="wc-logo">ARTE</span>
          <span class="wc-title">Planning d'équipe</span>
        </div>
        <div class="wc-sub">Entrez votre prénom et choisissez une couleur. Vos collègues vous reconnaîtront immédiatement dans le calendrier. Chaque couleur est unique.</div>
        <label class="wc-label">Votre prénom</label>
        <input type="text" id="wName" placeholder="ex : Sophie" autocomplete="off" />
        <label class="wc-label">Votre couleur</label>
        <div class="color-grid" id="colorGrid"></div>
        <div class="taken-hint" id="takenHint"></div>
        <div class="sep"></div>
        <div style="display:flex;justify-content:flex-end;">
          <button class="btn-primary" onclick="submitWelcome()">Accéder au planning →</button>
        </div>
      </div>
    </div>`;
  buildColorPicker();
}

function buildColorPicker() {
  const grid = document.getElementById('colorGrid');
  const hint = document.getElementById('takenHint');
  if (!grid) return;
  grid.innerHTML = '';
  const takenList = [];
  let firstFree = null;

  Object.entries(COL).forEach(([key, val]) => {
    const takenBy = teamMap[key];
    const isTaken = takenBy && takenBy !== me.name;
    if (!isTaken && !firstFree) firstFree = key;

    const sw = document.createElement('div');
    sw.className = 'cswatch' + (key===me.color?' active':'') + (isTaken?' taken':'');
    sw.style.background = val.dot;
    sw.title = isTaken ? `Pris par ${takenBy}` : val.label;
    if (isTaken) {
      sw.innerHTML = `<span class="sw-init">${takenBy[0].toUpperCase()}</span>`;
      takenList.push(`<span style="display:inline-flex;align-items:center;gap:4px;margin-right:10px;"><span style="width:7px;height:7px;border-radius:50%;background:${val.dot};display:inline-block;"></span>${esc(val.label)} → ${esc(takenBy)}</span>`);
    } else {
      sw.addEventListener('click', () => {
        me.color = key;
        document.querySelectorAll('.cswatch').forEach(s => s.classList.remove('active'));
        sw.classList.add('active');
      });
    }
    grid.appendChild(sw);
  });

  if (!teamMap[me.color] || teamMap[me.color]===me.name) {} else if(firstFree) me.color = firstFree;
  if (hint) hint.innerHTML = takenList.length ? 'Couleurs déjà prises : ' + takenList.join('') : '';
}

async function submitWelcome() {
  const name = (document.getElementById('wName').value || '').trim();
  if (!name) { alert('Merci d\'entrer votre prénom.'); return; }
  if (teamMap[me.color] && teamMap[me.color] !== name) {
    alert('Cette couleur est déjà prise. Choisissez-en une autre.'); return;
  }
  me.name = name;
  lsSet(LS_ME, me);
  await db.ref(`team/${me.color}`).set(me.name);
  screen = 'calendar';
  renderCalendar();
}

/* ═══════════════════════════════════════
   CALENDAR
═══════════════════════════════════════ */
function renderCalendar() {
  const todayKey = todayDk();
  const today    = new Date(); today.setHours(0,0,0,0);
  const base     = getMonday(today); base.setDate(base.getDate() + weekOff*7);
  const end      = new Date(base); end.setDate(end.getDate()+6);
  const mc       = COL[me.color] || COL.coral;
  const totalH   = (T_END - T_START) * HOUR_H;

  const days = Array.from({length:7}, (_,i) => {
    const d = new Date(base); d.setDate(d.getDate()+i);
    return { d, key:dk(d), isToday:dk(d)===todayKey, isWeekend:i>=5 };
  });

  // ── Legend ──
  const legendHtml = Object.entries(teamMap).map(([c,n]) =>
    `<div class="legend-item"><span class="legend-dot" style="background:${COL[c]?.dot||'#888'}"></span>${esc(n)}</div>`
  ).join('') || '<span style="font-size:12px;color:var(--text3);font-style:italic;padding:0 12px;">Aucun collaborateur connecté</span>';

  // ── Day headers ──
  const dhHtml = days.map(({d,isToday}) => {
    const di = d.getDay()===0?6:d.getDay()-1;
    return `<div class="dh-cell">
      <div class="dh-name">${DAY_NAMES[di]}</div>
      <div class="dh-num${isToday?' today':''}">${d.getDate()}</div>
    </div>`;
  }).join('');

  // ── Time sidebar ──
  const sidebarHtml = HOURS.map(h =>
    `<div class="time-label">${String(h).padStart(2,'0')}h</div>`
  ).join('');

  // ── Day columns ──
  const colsHtml = days.map(({d,key,isToday}) => {
    // Hour/half lines
    const lines = HOURS.map((_, i) => {
      const top = i * HOUR_H;
      return `<div class="hour-line" style="top:${top}px"></div>
              <div class="half-line" style="top:${top+HOUR_H/2}px"></div>`;
    }).join('');

    // Now indicator
    let nowBar = '';
    if (isToday) {
      const now = new Date();
      const top = toPx(`${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`);
      if (top >= 0 && top <= totalH)
        nowBar = `<div class="now-bar" id="now-bar" style="top:${Math.round(top)}px"></div>`;
    }

    // Events
    const dayEvs = Object.values(eventsMap).filter(e => e.date === key);
    const evsHtml = buildEventBlocks(dayEvs);

    return `<div class="day-col${isToday?' today-col':''}" data-date="${key}" onclick="handleGridClick(event,'${key}')">
      ${lines}${nowBar}${evsHtml}
    </div>`;
  }).join('');

  const wLabel = `Semaine du ${base.getDate()} ${MONTHS_S[base.getMonth()]} au ${end.getDate()} ${MONTHS_S[end.getMonth()]} ${end.getFullYear()}`;

  document.getElementById('app').innerHTML = `
    <div class="topbar">
      <div class="brand">
        <span class="brand-pill">ARTE</span>
        <span class="brand-name">Planning d'équipe</span>
      </div>
      <div class="week-nav">
        <button class="btn-icon" onclick="shiftWeek(-1)" title="Semaine précédente">‹</button>
        <button onclick="shiftWeek(0)">Aujourd'hui</button>
        <button class="btn-icon" onclick="shiftWeek(1)" title="Semaine suivante">›</button>
        <span class="week-label">${wLabel}</span>
      </div>
      <div class="profile-chip" onclick="changeUser()" title="Changer de profil">
        <span class="chip-dot" style="background:${mc.dot}"></span>
        <span>${esc(me.name)}</span>
        <span class="chip-caret">▾</span>
      </div>
    </div>

    <div class="legend-bar">${legendHtml}</div>

    <div class="cal-area">
      <div class="days-header">
        <div class="dh-spacer"></div>
        ${dhHtml}
      </div>
      <div class="grid-scroll" id="gridScroll">
        <div class="grid-body" style="height:${totalH}px">
          <div class="time-sidebar">${sidebarHtml}</div>
          ${colsHtml}
        </div>
      </div>
    </div>`;

  // Scroll to 8h
  requestAnimationFrame(() => {
    const gs = document.getElementById('gridScroll');
    if (gs) gs.scrollTop = (8 - T_START) * HOUR_H - 16;
  });

  // Update now-line every minute
  clearInterval(window._nowTimer);
  window._nowTimer = setInterval(() => {
    const bar = document.getElementById('now-bar');
    if (!bar) return;
    const now = new Date();
    const top = toPx(`${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`);
    bar.style.top = Math.round(top) + 'px';
  }, 30000);
}

/* ── Event blocks with overlap layout ── */
function buildEventBlocks(dayEvs) {
  if (!dayEvs.length) return '';
  const sorted = [...dayEvs].sort((a,b) => toMin(a.startTime) - toMin(b.startTime));

  // Group overlapping events
  const groups = [];
  sorted.forEach(ev => {
    const s = toMin(ev.startTime);
    const e = ev.endTime ? toMin(ev.endTime) : s + 60;
    let placed = false;
    for (const g of groups) {
      if (s < g.maxEnd) { g.items.push({ev,s,e}); g.maxEnd=Math.max(g.maxEnd,e); placed=true; break; }
    }
    if (!placed) groups.push({items:[{ev,s,e}], maxEnd:e});
  });

  return groups.flatMap((g,_) =>
    g.items.map(({ev},i) => {
      const n = g.items.length;
      const top    = toPx(ev.startTime);
      const endT   = ev.endTime || toTime(toMin(ev.startTime)+60);
      const height = Math.max(22, toPx(endT) - top);
      const c      = COL[ev.color] || COL.coral;
      const leftPct= i * (100/n);
      const widPct = (100/n) - 1;
      const short  = height < 38;

      return `<div class="ev-block"
        style="top:${Math.round(top)}px;height:${Math.round(height)}px;left:calc(${leftPct}% + 2px);width:calc(${widPct}% - 2px);background:${c.bg};border-left-color:${c.dot};color:${c.dot};"
        onclick="openEdit(event,'${ev.id}')"
        title="${esc(ev.title)} — ${esc(ev.person)}${ev.desc?'\n'+esc(ev.desc):''}">
        ${short
          ? `<span class="ev-title">${esc(ev.title)}</span>`
          : `<div class="ev-time">${ev.startTime}${ev.endTime?'–'+ev.endTime:''}</div>
             <div class="ev-title">${esc(ev.title)}</div>
             <div class="ev-person">${esc(ev.person)}</div>`}
      </div>`;
    })
  ).join('');
}

/* ── Grid click → add ── */
function handleGridClick(e, dateKey) {
  if (e.target.closest('.ev-block')) return;
  const col  = e.currentTarget;
  const rect = col.getBoundingClientRect();
  const y    = e.clientY - rect.top;
  openAdd(dateKey, pxToTime(y));
}

function shiftWeek(d) { weekOff = d===0?0:weekOff+d; renderCalendar(); }

async function changeUser() {
  if (!confirm('Changer de profil ? Votre couleur sera libérée.')) return;
  if (db && teamMap[me.color]===me.name) await db.ref(`team/${me.color}`).remove();
  lsRm(LS_ME);
  me = {name:'', color:'coral'};
  screen = 'welcome';
  renderWelcome();
}

/* ═══════════════════════════════════════
   MODALS
═══════════════════════════════════════ */
function openOverlay()  { document.getElementById('overlay').classList.add('open'); }
function closeOverlay() {
  document.getElementById('overlay').classList.remove('open');
  document.getElementById('modal').innerHTML = '';
}

// Click outside modal closes it
document.getElementById('overlay').addEventListener('click', e => {
  if (e.target === e.currentTarget) closeOverlay();
});

/* ── Add modal ── */
function openAdd(dateStr, startTime) {
  const mc  = COL[me.color] || COL.coral;
  const endT = toTime(Math.min(T_END*60, toMin(startTime)+60));
  const [y,mo,d] = dateStr.split('-').map(Number);
  const dateLabel = `${d} ${MONTHS_L[mo-1]} ${y}`;

  document.getElementById('modal').innerHTML = `
    <button class="modal-close" onclick="closeOverlay()">×</button>
    <div class="modal-title">Ajouter une mission · ${dateLabel}</div>
    <div class="modal-who">
      <span style="width:10px;height:10px;border-radius:50%;background:${mc.dot};display:inline-block;flex-shrink:0;"></span>
      Mission pour <strong>${esc(me.name)}</strong>
    </div>
    <div class="form-grid full"><div class="ff">
      <label>Titre de la mission *</label>
      <input type="text" id="mTitle" placeholder="ex : Réunion audience hebdo, analyse Médiamat…" />
    </div></div>
    <div class="form-grid">
      <div class="ff"><label>Début</label><input type="time" id="mStart" value="${startTime}" /></div>
      <div class="ff"><label>Fin</label><input type="time" id="mEnd" value="${endT}" /></div>
    </div>
    <div class="form-grid full"><div class="ff">
      <label>Description / notes (optionnel)</label>
      <textarea id="mDesc" placeholder="Détails, objectifs, liens utiles…"></textarea>
    </div></div>
    <div class="modal-footer">
      <div></div>
      <div class="right">
        <button onclick="closeOverlay()">Annuler</button>
        <button class="btn-primary" onclick="submitAdd('${dateStr}')">Ajouter</button>
      </div>
    </div>`;
  openOverlay();
  setTimeout(() => { const el=document.getElementById('mTitle'); if(el) el.focus(); }, 80);
}

async function submitAdd(dateStr) {
  const title = (document.getElementById('mTitle').value||'').trim();
  const start = document.getElementById('mStart').value;
  const end   = document.getElementById('mEnd').value;
  const desc  = (document.getElementById('mDesc').value||'').trim();
  if (!title) { document.getElementById('mTitle').focus(); return; }
  if (start && end && toMin(start) >= toMin(end)) { alert('L\'heure de fin doit être après le début.'); return; }
  const id = uid();
  await db.ref(`events/${id}`).set({ id, title, desc, person:me.name, color:me.color, date:dateStr, startTime:start, endTime:end, createdAt:Date.now() });
  closeOverlay();
}

/* ── Edit modal ── */
function openEdit(e, evId) {
  e.stopPropagation();
  const ev = eventsMap[evId];
  if (!ev) return;
  const c = COL[ev.color] || COL.coral;
  const [y,mo,d] = ev.date.split('-').map(Number);
  const dateLabel = `${d} ${MONTHS_L[mo-1]} ${y}`;
  const canEdit = ev.person === me.name;

  document.getElementById('modal').innerHTML = `
    <button class="modal-close" onclick="closeOverlay()">×</button>
    <div class="modal-title">${canEdit?'Modifier':'Voir'} la mission · ${dateLabel}</div>
    <div class="modal-who">
      <span style="width:10px;height:10px;border-radius:50%;background:${c.dot};display:inline-block;flex-shrink:0;"></span>
      <strong>${esc(ev.person)}</strong>
      ${!canEdit?'<span style="font-size:11px;color:var(--text3);margin-left:4px;">(lecture seule)</span>':''}
    </div>
    <div class="form-grid full"><div class="ff">
      <label>Titre</label>
      <input type="text" id="mTitle" value="${esc(ev.title)}" ${canEdit?'':'readonly'} />
    </div></div>
    <div class="form-grid">
      <div class="ff"><label>Début</label><input type="time" id="mStart" value="${ev.startTime||''}" ${canEdit?'':'readonly'} /></div>
      <div class="ff"><label>Fin</label><input type="time" id="mEnd" value="${ev.endTime||''}" ${canEdit?'':'readonly'} /></div>
    </div>
    <div class="form-grid full"><div class="ff">
      <label>Description / notes</label>
      <textarea id="mDesc" ${canEdit?'':'readonly'}>${esc(ev.desc||'')}</textarea>
    </div></div>
    <div class="modal-footer">
      <div>${canEdit?`<button class="btn-danger" onclick="deleteEv('${evId}')">Supprimer</button>`:''}</div>
      <div class="right">
        <button onclick="closeOverlay()">Fermer</button>
        ${canEdit?`<button class="btn-primary" onclick="submitEdit('${evId}')">Enregistrer</button>`:''}
      </div>
    </div>`;
  openOverlay();
}

async function submitEdit(evId) {
  const title = (document.getElementById('mTitle').value||'').trim();
  const start = document.getElementById('mStart').value;
  const end   = document.getElementById('mEnd').value;
  const desc  = (document.getElementById('mDesc').value||'').trim();
  if (!title) { document.getElementById('mTitle').focus(); return; }
  if (start && end && toMin(start) >= toMin(end)) { alert('L\'heure de fin doit être après le début.'); return; }
  await db.ref(`events/${evId}`).update({ title, startTime:start, endTime:end, desc });
  closeOverlay();
}

async function deleteEv(evId) {
  if (!confirm('Supprimer cette mission ?')) return;
  await db.ref(`events/${evId}`).remove();
  closeOverlay();
}

/* ── START ── */
init();
</script>
